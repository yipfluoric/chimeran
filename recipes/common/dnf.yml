modules:
  - type: dnf
    repos:
      copr:
        - atim/starship
        - lionheartp/Hyprland
        - v8v88v8v88/helium
      files:
        add:
          - https://github.com/terrapkg/subatomic-repos/raw/main/terra.repo
      
    install:
      packages:
        - greetd
        - micro
        - starship
        - niri
        - nautilus
        - loupe
        - celluloid
        - scroll
        - adw-gtk3-theme
        - xdg-desktop-portal-wlr
        - ueberzugpp
        - xwayland-satellite 
        - helium
        - walker
        - elephant
        - papirus-icon-theme
        - geistmono-nerd-fonts 
        - firefox
        - firefox-langpacks
        - ScopeBuddy
        - gamescope
        - scx-scheds-nightly
        - scx-tools-nightly
        ### because bluebuild doesnt want to pull from other repos for noctalia :<
        - dejavu-sans-fonts
        - libqalculate
        - jemalloc
        - wlroots
        - cage
        - repo: copr:copr.fedorainfracloud.org:lionheartp:Hyprland
          packages:
            - noctalia-git
            - noctalia-greeter
          
      exclude:
        - waybar
