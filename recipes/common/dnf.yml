modules:
  - type: dnf
    repos:
      files:
        add:
          - https://github.com/terrapkg/subatomic-repos/raw/main/terra.repo
      copr:
        - atim/starship
        - lionheartp/Hyprland
        - v8v88v8v88/helium
      
    install:
      packages:
        - greetd
        - micro
        - starship
        - niri
        - nautilus
        - loupe
        - celluloid
        - scroll
        - adw-gtk3-theme
        - xdg-desktop-portal-wlr
        - ueberzugpp
        - xwayland-satellite 
        - helium
        - walker
        - elephant
        - noctalia
        - noctalia-greeter
        - papirus-icon-theme
        - geistmono-nerd-fonts 
        - firefox
        - firefox-langpacks
        - ScopeBuddy
        - gamescope
        - scx-scheds-nightly
        - scx-tools-nightly

      exclude:
        - waybar
