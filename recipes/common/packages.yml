modules:
  - type: dnf
    repos:
      copr:
        - atim/starship
        - lionheartp/Hyprland
        - v8v88v8v88/helium
        - faugus/faugus-launcher

      files:
        add:
          - https://github.com/terrapkg/subatomic-repos/raw/main/terra.repo

    install:
      packages:
        - greetd
        - micro
        - starship
        - niri
        - nautilus
        - loupe
        - celluloid
        - scroll
        - adw-gtk3-theme
        - xdg-desktop-portal-wlr
        - ueberzugpp
        - xwayland-satellite
        - helium
        - walker
        - elephant
        - papirus-icon-theme
        - geistmono-nerd-fonts
        - firefox
        - firefox-langpacks
        - ScopeBuddy
        - gamescope
        - scx-scheds-nightly
        - scx-tools-nightly
        - tuned
        - tuned-ppd
        - fastfetch
        - hyfetch
        - faugus-launcher

        ### Noctalia dependencies, because it install purely from the lionheartP repo and not much else
        - dejavu-sans-fonts
        - libqalculate
        - jemalloc
        - wlroots
        - repo: copr:copr.fedorainfracloud.org:lionheartp:Hyprland
          packages:
            - noctalia-git
            - noctalia-greeter

      exclude:
        - waybar

  - type: brew
    nofile-limits: true
    brew-analytics: false

  - type: default-flatpaks
    configurations:
      - scope: user
        repo:
          title: Flathub (user)
      - notify: true
        scope: system
        repo:
          title: Flathub (system)
        install:
          - io.github.kolunmi.Bazaar
          - com.github.tchx84.Flatseal
          - io.github.flattool.Warehouse
          - org.gnome.Firmware
          - io.github.dvlv.boxbuddyrs
